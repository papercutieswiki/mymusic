<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luciano Masala - My Music</title>
    <style>
        @font-face {
            font-family: 'SF Pro Display';
            src: url('SF-Pro-Display-Regular.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
        }

        .title {
            position: absolute;
            width: 1920px;
            text-align: center;
            top: 130px; 
            font-size: 14px;
            color: #808080;
            letter-spacing: 0.5px;
        }

        .gallery-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 58px;
        }

        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            width: 317px;
        }

        .image-container {
            width: 317px;
            height: 234px;
            position: relative;
            overflow: hidden;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        .artist-name {
            margin-top: 15px;
            font-size: 14px;
            color: #808080;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .card-wrapper:hover .gallery-image {
            filter: brightness(70%);
        }

        .card-wrapper:hover .artist-name {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="title">my music</div>

    <div class="gallery-container">
        <a href="#papercuties" class="card-wrapper">
            <div class="image-container">
                <img src="papercuties1.png" alt="Papercuties" class="gallery-image">
            </div>
            <div class="artist-name">papercuties</div>
        </a>

        <a href="#marie" class="card-wrapper">
            <div class="image-container">
                <img src="marie1.png" alt="Marie" class="gallery-image">
            </div>
            <div class="artist-name">marie</div>
        </a>

        <a href="#hershel" class="card-wrapper">
            <div class="image-container">
                <img src="hershel1.png" alt="Hershel" class="gallery-image">
            </div>
            <div class="artist-name">hershel</div>
        </a>
    </div>

</body>
</html>
