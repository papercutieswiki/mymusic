<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>my music</title>
    <style>
        @font-face {
            font-family: 'SF UI Display';
            src: url('SFUIDisplay-Regular.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
            font-family: 'SF UI Display', -apple-system, sans-serif;
        }

        .title {
            position: absolute;
            width: 1920px;
            text-align: center;
            top: 280px; 
            font-size: 19px;
            color: #808080;
            letter-spacing: 0.5px;
        }

        .gallery-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 58px;
        }

        .card-wrapper {
            position: relative;
            width: 317px;
            height: 234px;
            text-decoration: none;
            overflow: hidden;
            display: block;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
            display: block;
        }

        .artist-name {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            width: 100%;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        .card-wrapper:hover .gallery-image {
            filter: brightness(40%);
        }

        .card-wrapper:hover .artist-name {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="title">my music</div>

    <div class="gallery-container">
        <a href="https://papercutieswiki.github.io/papercuties" class="card-wrapper">
            <img src="papercuties1.png" alt="papercuties" class="gallery-image">
            <div class="artist-name">papercuties</div>
        </a>

        <a href="https://papercutieswiki.github.io/marie" class="card-wrapper">
            <img src="marie1.png" alt="marie" class="gallery-image">
            <div class="artist-name">marie</div>
        </a>

        <a href="https://papercutieswiki.github.io/hershel" class="card-wrapper">
            <img src="hershel1.png" alt="hershel" class="gallery-image">
            <div class="artist-name">hershel</div>
        </a>
    </div>

</body>
</html>
